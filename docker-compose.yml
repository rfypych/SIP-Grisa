version: '3.8'

services:

  # ===== DATABASE =====
  db:
    image: mysql:8.0
    container_name: sip_grisa_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-grisa_secure_2026}
      MYSQL_DATABASE: sip_grisa
    volumes:
      - sip_grisa_db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # ===== BACKEND (FastAPI) =====
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sip_grisa_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Override host DB agar mengarah ke service 'db' di Docker network
      DB_HOST: db
      DB_USER: ${MYSQL_USER:-root}
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-grisa_secure_2026}
      DB_NAME: sip_grisa
      SECRET_KEY: ${SECRET_KEY:-change_this_secret_key_in_production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      # Mount folder data agar file wajah & suara tidak hilang saat container restart
      - sip_grisa_face_data:/app/data
      - sip_grisa_uploads:/app/temp_uploads
    ports:
      - "8000:8000"

  # ===== FRONTEND (React + Nginx) =====
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sip_grisa_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  sip_grisa_db_data:
  sip_grisa_face_data:
  sip_grisa_uploads:
